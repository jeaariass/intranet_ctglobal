name: 🚀 Deploy Intranet CTGlobal

on:
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Tests y verificación de código
  # ─────────────────────────────────────────
  test:
    name: 🧪 Verificar código
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: 📦 Instalar dependencias backend
        run: |
          cd backend
          npm ci --ignore-scripts

      - name: ✅ Verificar sintaxis backend
              run: |
                cd backend
                node --check src/server.js
                node --check src/lib/prisma.js
                node --check src/middleware/auth.js
                node --check src/routes/auth.js
                node --check src/routes/users.js
                node --check src/routes/announcements.js
                node --check src/routes/documents.js
                node --check src/routes/events.js
                node --check src/routes/wiki.js
                node --check src/routes/equipment.js
                node --check src/routes/geoprojects.js
                node --check src/routes/geoauth.js
                node --check src/routes/sessions.js
                node --check src/routes/reports.js
                node --check src/routes/invoices.js
                echo "✅ Backend: sintaxis OK"

      - name: 📦 Instalar dependencias frontend
        run: |
          cd frontend
          npm ci

      - name: 🔨 Build frontend
        run: |
          cd frontend
          npm run build
          echo "✅ Frontend: build exitoso"

      - name: 📊 Resumen del build
        run: |
          echo "### 📦 Tamaño del bundle" >> $GITHUB_STEP_SUMMARY
          du -sh frontend/dist/ >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📁 Archivos generados" >> $GITHUB_STEP_SUMMARY
          ls -lh frontend/dist/assets/ >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────
  # JOB 2: Deploy al servidor (solo en push a main)
  # ─────────────────────────────────────────
  deploy:
    name: 🌐 Deploy a producción
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 🔨 Build frontend para producción
        run: |
          cd frontend
          npm ci
          echo "VITE_API_URL=https://intranet.ctglobal.com.co/api" > .env
          npm run build

      - name: 🔑 Configurar SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 🌐 Agregar servidor a known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: 📤 Sincronizar backend al servidor
        run: |
          rsync -avz --delete \
            --exclude 'node_modules/' \
            --exclude '.env' \
            --exclude 'data/' \
            --exclude 'uploads/' \
            backend/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/intranet_ctglobal/backend/

      - name: 📤 Sincronizar frontend build al servidor
        run: |
          rsync -avz --delete \
            frontend/dist/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/intranet_ctglobal/frontend/dist/

      - name: ♻️ Reiniciar servicios en el servidor
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e
            cd /var/www/intranet_ctglobal/backend
            npm install --production --ignore-scripts
            pm2 reload intranet-ctglobal || pm2 start ecosystem.config.js --env production
            pm2 save
            sudo nginx -t && sudo systemctl reload nginx
            echo "✅ Deploy completado en $(date)"
          EOF

      - name: 🔔 Notificación de éxito
        if: success()
        run: |
          echo "### ✅ Deploy exitoso!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🌍 https://intranet.ctglobal.com.co" >> $GITHUB_STEP_SUMMARY
          echo "🕐 $(date)" >> $GITHUB_STEP_SUMMARY

      - name: 🚨 Notificación de fallo
        if: failure()
        run: |
          echo "### ❌ Deploy fallido" >> $GITHUB_STEP_SUMMARY
          echo "Revisa los logs del workflow para más detalles." >> $GITHUB_STEP_SUMMARY
