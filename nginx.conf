# /etc/nginx/sites-available/intranet.ctglobal.com.co

server {
    listen 80;
    server_name intranet.ctglobal.com.co;

    # Redirigir todo HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name intranet.ctglobal.com.co;

    # SSL (reemplaza con tus certificados, puedes usar Certbot)
    ssl_certificate     /etc/letsencrypt/live/intranet.ctglobal.com.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/intranet.ctglobal.com.co/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /var/www/intranet_ctglobal/frontend/dist;
    index index.html;

    # Frontend React (SPA - todas las rutas van al index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API - proxy al servidor Node.js
    location /api/ {
        proxy_pass         http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # Archivos subidos
    location /uploads/ {
        alias /var/www/intranet_ctglobal/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Caché para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Logs
    access_log /var/log/nginx/intranet.ctglobal.access.log;
    error_log  /var/log/nginx/intranet.ctglobal.error.log;
}
